<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Messages</title>
  <style>
    html,body{margin:0!important;padding:0!important;width:100%;height:100%;background:#f5f6f8;overflow:hidden;-webkit-text-size-adjust:100%;font-family:Arial,Roboto,Helvetica,sans-serif;color:#202124}.app{display:flex;flex-direction:column;height:100vh;background:var(--chat-bg,#f5f6f8);color:#202124;opacity:0}.app.ready{opacity:1}.hidden{display:none!important}
    .phone-status-bar{padding:calc(7px + env(safe-area-inset-top)) 20px 5px;display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:500;letter-spacing:-.01em;line-height:1;min-height:18px;color:rgba(32,33,36,.92);background:var(--chat-header,#f2f4f7);flex-shrink:0}#statusTime{font-size:11px;font-weight:500;letter-spacing:-.01em}.status-right{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;letter-spacing:-.01em}#statusSignal,#statusBattery{font-size:11px;font-weight:500;letter-spacing:-.01em;line-height:1}.signal-bars{display:flex;align-items:end;gap:1.5px;height:10px;margin-right:1px}.signal-bars span{width:2px;background:currentColor;border-radius:1px;opacity:.28}.signal-bars span:nth-child(1){height:3px}.signal-bars span:nth-child(2){height:5px}.signal-bars span:nth-child(3){height:7px}.signal-bars span:nth-child(4){height:10px}.signal-bars.bars-1 span:nth-child(-n+1),.signal-bars.bars-2 span:nth-child(-n+2),.signal-bars.bars-3 span:nth-child(-n+3),.signal-bars.bars-4 span:nth-child(-n+4){opacity:1}.battery{width:7px;height:11px;border:1.1px solid currentColor;border-radius:2px;position:relative;overflow:visible;margin-left:1px;opacity:.9;display:flex;align-items:flex-end}.battery::after{content:"";position:absolute;left:2px;right:2px;top:-2px;width:auto;height:1.5px;background:currentColor;border-radius:1px 1px 0 0}.battery-fill{position:absolute;left:0;bottom:0;width:100%;height:var(--battery-fill-height,43%);background:currentColor;border-radius:0 0 1px 1px}
    .header{background:var(--chat-header,#f2f4f7);color:#202124;padding:12px 16px 14px;display:flex;align-items:center;gap:14px;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,.06);box-shadow:none}.back-button,.call-button{width:38px;height:38px;border:none;background:transparent;color:#202124;flex-shrink:0;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;padding:0}.back-button{font-size:34px;line-height:1;font-weight:400}.profile-tile{display:none;width:42px;height:42px;border-radius:50%;background:#e3e7ec;background-size:cover;background-position:center;flex-shrink:0}.header-text{flex:1;min-width:0;text-align:left}.header-name{font-size:24px;font-weight:500;line-height:1.1;letter-spacing:-.035em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#202124;text-align:left}.header-status{display:none}.call-button svg{width:24px;height:24px;fill:currentColor;transform:none}
    .chat-container{flex:1;overflow-y:auto;padding:18px 14px 12px;background:var(--chat-bg,#f5f6f8);-webkit-overflow-scrolling:touch}.message{margin:12px 0;padding:13px 16px;border-radius:24px;max-width:82%;clear:both;font-size:18px;line-height:1.38;word-wrap:break-word;box-shadow:none;-webkit-tap-highlight-color:transparent}.from-them{background:var(--received-bubble,#e5e7eb);color:#202124;float:left;border-bottom-left-radius:8px}.from-you{background:var(--sent-bubble,#dce8f3);color:#202124;float:right;margin-left:auto;border-bottom-right-radius:8px}.pending-message{opacity:.78}.target-highlight{outline:3px solid rgba(85,125,160,.35);transition:outline .4s ease}.image-message{padding:0;background:transparent;box-shadow:none;max-width:82%;-webkit-tap-highlight-color:transparent;outline:none}.image-message img{display:block;width:245px;max-width:100%;border-radius:22px;cursor:pointer;box-shadow:0 5px 18px rgba(0,0,0,.12);-webkit-tap-highlight-color:transparent;outline:none;user-select:none;-webkit-user-drag:none}.image-message img:focus,.image-message:focus{outline:none}.timestamp-divider{clear:both;text-align:center;margin:22px 0 12px;color:#6b7280;font-size:14px;font-weight:500}.timestamp-divider span{display:inline-block;background:transparent!important;color:#6b7280;font-size:14px;padding:0;border-radius:0;font-weight:500}
    .footer{background:var(--chat-footer,#f5f6f8);display:flex;padding:10px 14px 20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));align-items:center;flex-shrink:0;border-top:none;gap:9px}.footer input{flex:1;padding:13px 17px;border-radius:26px;border:none;background:#e2e6eb;color:#202124;font-size:19px;min-width:0;outline:none}.footer input::placeholder{color:#4b5563}.camera-button,.send-button{width:46px;height:46px;border:none;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;padding:0}.camera-button{background:transparent;color:#202124}.camera-button svg{width:25px;height:25px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}.send-button{background:var(--send-button,#c7b6ee);color:#202124}.send-button svg{width:24px;height:24px;fill:currentColor}
    .image-viewer{position:fixed;inset:0;background:#05070a;z-index:999;display:none;overflow:hidden;touch-action:none}.image-viewer.open{display:block}.viewer-topbar{position:absolute;top:calc(8px + env(safe-area-inset-top));left:0;right:0;height:48px;display:flex;justify-content:flex-end;align-items:center;padding:0 14px;z-index:5;pointer-events:none}.viewer-close{pointer-events:auto;width:42px;height:42px;border-radius:14px;border:none;background:rgba(38,49,61,.9);color:#f4f7fb;font-size:26px;line-height:1;font-weight:600;-webkit-tap-highlight-color:transparent}.viewer-image{position:absolute;top:50%;left:50%;max-width:92vw;max-height:86vh;transform:translate(-50%,-50%) scale(1);transform-origin:center center;user-select:none;-webkit-user-drag:none;border-radius:8px}
  </style>
</head>
<body>
  <div class="app">
    <div class="phone-status-bar"><div id="statusTime">10:47</div><div class="status-right"><div class="signal-bars bars-4" id="statusSignalBars"><span></span><span></span><span></span><span></span></div><span id="statusSignal">5G</span><span id="statusBattery">43%</span><div class="battery"><div class="battery-fill" id="statusBatteryFill"></div></div></div></div>
    <div class="header"><button class="back-button" type="button">‹</button><div class="profile-tile" id="profileCircle"></div><div class="header-text"><div class="header-name" id="chatHeader"></div><div class="header-status">Active now</div></div><button class="call-button" type="button" aria-label="Call"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.7 3.3 3.3 4.9 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.6.6 4 .6.7 0 1.2.5 1.2 1.2V21c0 .7-.5 1.2-1.2 1.2C10.2 22.2 1.8 13.8 1.8 3.4 1.8 2.7 2.3 2.2 3 2.2h4.3c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.7.6 4 .1.4 0 .9-.3 1.2l-2.2 2.2z"></path></svg></button></div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="footer"><button class="camera-button" type="button" aria-label="Camera"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8h3l1.5-2h7L17 8h3v11H4z"></path><circle cx="12" cy="13.5" r="3.5"></circle></svg></button><input id="messageInput" type="text" placeholder="Message"><button class="send-button" onclick="sendText()" type="button" aria-label="Send"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 20.5L22 12 3 3.5v6.4L14 12 3 14.1z"></path></svg></button></div>
  </div>
  <div class="image-viewer" id="imageViewer"><div class="viewer-topbar"><button class="viewer-close" type="button" onclick="closeImageViewer()">×</button></div><img class="viewer-image" id="viewerImage" src="" alt=""></div>
  <script src="config.js"></script><script src="shared.js"></script>
  <script>
    const ME=getQueryParam("me","Jess"),THEM=getQueryParam("them","Yo"),TARGET_MESSAGE_ID=getQueryParam("messageId","");document.title=ME+" Messages";document.getElementById("chatHeader").textContent=THEM;
    let serverMessages=[],pendingMessages=[],lastRendered="",didScrollToTarget=false;let sceneTimestampIso=new Date().toISOString(),sceneDisplayDate="",sceneDisplayTime="10:47",sentTimestampOverrides={};
    async function loadStyles(){try{applyChatStyles(await apiGet("getChatStyles",{me:ME,them:THEM}))}catch(e){console.log("Load styles error:",e);document.querySelector(".app").classList.add("ready")}}
    function applyChatStyles(s){if(!s){document.querySelector(".app").classList.add("ready");return}setCssVar("--chat-header",s["Chat Header Colour"]);setCssVar("--chat-footer",s["Chat Footer Colour"]);setCssVar("--chat-bg",s["Chat Background Colour"]);setCssVar("--sent-bubble",s["Sent Bubble Colour"]);setCssVar("--received-bubble",s["Received Bubble Colour"]);setCssVar("--send-button",s["Send Button Colour"]);if(s["Profile Image URL"])document.getElementById("profileCircle").style.backgroundImage=`url("${s["Profile Image URL"]}")`;document.querySelector(".app").classList.add("ready")}
    async function loadStatusFromHomeSettings(){try{const s=await apiGet("getHomeScreenSettings",{owner:ME});const time=s["Display Time"]||"10:47",displayDate=s["Display Date"]||s["Date"]||"",signal=s["Signal"]||"5G",b=parseInt(s["Battery %"]||"43",10),bat=Math.max(0,Math.min(100,isNaN(b)?43:b));sceneDisplayDate=displayDate;sceneDisplayTime=time;sceneTimestampIso=buildSceneTimestamp(displayDate,time);statusTime.textContent=time;statusSignal.textContent=signal;statusBattery.textContent=bat+"%";statusBatteryFill.style.width="100%";statusBatteryFill.style.height=bat+"%";statusBatteryFill.style.setProperty("--battery-fill-height",bat+"%")}catch(e){console.log("Status settings error:",e)}}
    async function loadMessages(){try{serverMessages=await apiGet("getMessages");reconcilePendingMessages();renderMessages()}catch(e){console.log("Load messages error:",e)}}
    function addPendingMessage(message){pendingMessages.push({messageId:"local_"+Date.now(),timestamp:sceneTimestampIso,sender:ME,type:"text",message,imageUrl:"",pending:true});renderMessages(true)}
    function normaliseText(t){return String(t||"").trim().replace(/\s+/g," ")}
    function reconcilePendingMessages(){pendingMessages=pendingMessages.filter(p=>!serverMessages.some(s=>{const match=s.sender===p.sender&&s.type===p.type&&normaliseText(s.message)===normaliseText(p.message);if(match)sentTimestampOverrides[getMessageKey(s.sender,s.message)]=p.timestamp;return match}))}
    function renderMessages(force=false){const chat=chatContainer,messages=serverMessages.concat(pendingMessages);let prev="";const html=messages.map(m=>{const side=m.sender===ME?"from-you":"from-them",time=formatThreadTimeLabel(getDisplayTimestamp(m)),id=escapeHtml(m.messageId||""),pend=m.pending?" pending-message":"";let ts="";if(time&&time!==prev){ts=`<div class="timestamp-divider"><span>${escapeHtml(time)}</span></div>`;prev=time}if(m.type==="image")return `${ts}<div class="message ${side} image-message${pend}" data-message-id="${id}"><img src="${escapeHtml(m.imageUrl)}" onclick="openImageViewer('${escapeJsString(m.imageUrl)}')" tabindex="-1"></div>`;return `${ts}<div class="message ${side}${pend}" data-message-id="${id}">${escapeHtml(m.message)}</div>`}).join("");if(force||html!==lastRendered){chat.innerHTML=html;lastRendered=html;if(TARGET_MESSAGE_ID&&!didScrollToTarget)scrollToTargetWhenReady(TARGET_MESSAGE_ID);else chat.scrollTop=chat.scrollHeight}}
    function formatThreadTimeLabel(t){if(!t)return"";const d=new Date(t);if(isNaN(d.getTime()))return t;const now=new Date(),md=new Date(d.getFullYear(),d.getMonth(),d.getDate()),td=new Date(now.getFullYear(),now.getMonth(),now.getDate()),diff=Math.round((td-md)/(1000*60*60*24)),time=d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",hour12:false});if(diff===0)return"Today "+time;if(diff===1)return"Yesterday "+time;if(diff>1&&diff<7)return d.toLocaleDateString([],{weekday:"long"})+" "+time;return d.toLocaleDateString([],{day:"numeric",month:"short"})+" "+time}
    const viewer=imageViewer,viewerImageEl=viewerImage;let viewerScale=1,viewerX=0,viewerY=0,dragging=false,lastX=0,lastY=0,pinchStartDistance=0,pinchStartScale=1;
    function openImageViewer(src){if(document.activeElement)document.activeElement.blur();viewerImageEl.src=src;viewerScale=1;viewerX=0;viewerY=0;updateViewerTransform();viewer.classList.add("open")}function closeImageViewer(){viewer.classList.remove("open");viewerImageEl.src=""}function updateViewerTransform(){viewerImageEl.style.transform=`translate(calc(-50% + ${viewerX}px), calc(-50% + ${viewerY}px)) scale(${viewerScale})`}
    viewer.addEventListener("wheel",e=>{e.preventDefault();viewerScale=Math.max(1,Math.min(5,viewerScale+(e.deltaY<0?.12:-.12)));updateViewerTransform()},{passive:false});viewer.addEventListener("mousedown",e=>{dragging=true;lastX=e.clientX;lastY=e.clientY});window.addEventListener("mousemove",e=>{if(!dragging)return;viewerX+=e.clientX-lastX;viewerY+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;updateViewerTransform()});window.addEventListener("mouseup",()=>dragging=false);viewer.addEventListener("touchstart",e=>{if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY}if(e.touches.length===2){dragging=false;pinchStartDistance=getTouchDistance(e.touches);pinchStartScale=viewerScale}},{passive:false});viewer.addEventListener("touchmove",e=>{e.preventDefault();if(e.touches.length===1&&dragging){viewerX+=e.touches[0].clientX-lastX;viewerY+=e.touches[0].clientY-lastY;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;updateViewerTransform()}if(e.touches.length===2){const d=getTouchDistance(e.touches);viewerScale=Math.max(1,Math.min(5,pinchStartScale*(d/pinchStartDistance)));updateViewerTransform()}},{passive:false});viewer.addEventListener("touchend",()=>dragging=false);function getTouchDistance(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy)}
    function scrollToTargetWhenReady(id,attempts=0){const target=chatContainer.querySelector(`[data-message-id="${CSS.escape(id)}"]`);if(!target){if(attempts<12)setTimeout(()=>scrollToTargetWhenReady(id,attempts+1),150);else chatContainer.scrollTop=chatContainer.scrollHeight;return}Promise.all(Array.from(chatContainer.querySelectorAll("img")).map(img=>img.complete?Promise.resolve():new Promise(r=>{img.onload=r;img.onerror=r}))).then(()=>setTimeout(()=>{target.scrollIntoView({behavior:"auto",block:"center"});target.classList.add("target-highlight");didScrollToTarget=true;setTimeout(()=>target.classList.remove("target-highlight"),1800)},250))}
    async function sendText(){const input=messageInput,message=input.value.trim();if(!message)return;input.value="";const sentAt=sceneTimestampIso;sentTimestampOverrides[getMessageKey(ME,message)]=sentAt;addPendingMessage(message);try{await apiPost("sendMessage",{sender:ME,message,timestamp:sentAt,displayDate:sceneDisplayDate,displayTime:sceneDisplayTime});pendingMessages=pendingMessages.filter(p=>!(p.sender===ME&&normaliseText(p.message)===normaliseText(message)));await loadMessages()}catch(e){console.log("Send message error:",e)}}
    function getMessageKey(sender,message){return String(sender||"")+"|"+normaliseText(message)}
    function getDisplayTimestamp(message){const key=getMessageKey(message.sender,message.message);return sentTimestampOverrides[key]||message.timestamp||sceneTimestampIso}
    function buildSceneTimestamp(displayDate,displayTime){const tm=String(displayTime||"10:47").match(/^(\d{1,2}):(\d{2})/),h=tm?parseInt(tm[1],10):10,m=tm?parseInt(tm[2],10):47;let txt=String(displayDate||"").trim(),d;if(/^\d{4}-\d{2}-\d{2}$/.test(txt)){const p=txt.split("-").map(Number);d=new Date(p[0],p[1]-1,p[2],h,m,0,0)}else if(txt){d=new Date(txt);if(isNaN(d.getTime()))d=new Date(txt+" "+new Date().getFullYear());if(!isNaN(d.getTime()))d.setHours(h,m,0,0)}if(!d||isNaN(d.getTime())){d=new Date();d.setHours(h,m,0,0)}return d.toISOString()}
    function setCssVar(n,v){if(v)document.documentElement.style.setProperty(n,v)}function escapeHtml(t){return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}function escapeJsString(t){return String(t||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'")}
    messageInput.addEventListener("keydown",e=>{if(e.key==="Enter")sendText()});loadStyles();loadStatusFromHomeSettings();loadMessages();setInterval(loadMessages,1500);setInterval(loadStatusFromHomeSettings,5000);
  </script>
</body>
</html>
