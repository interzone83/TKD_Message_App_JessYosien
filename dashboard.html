<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><title>Messaging Dashboard</title>
  <style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f3f4f6;color:#111827}.wrapper{padding:18px;max-width:1100px;margin:0 auto}h1{margin:0 0 14px;font-size:24px}.pair-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}.card{background:white;border-radius:18px;padding:16px;box-shadow:0 4px 18px rgba(0,0,0,.08)}.person-name{font-size:24px;font-weight:800;margin-bottom:12px}.button{display:block;width:100%;box-sizing:border-box;border:none;border-radius:12px;padding:13px 14px;margin-top:10px;background:#075e54;color:white;font-size:16px;text-align:center;text-decoration:none;font-weight:700;cursor:pointer}.button.secondary{background:#128c7e}.button.light{background:#e5e7eb;color:#111827}.button.warning{background:#374151}.bottom-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.small-status{font-size:13px;color:#6b7280;margin-top:8px}.status{margin-top:14px;font-size:13px;color:#6b7280;word-break:break-all}@media(max-width:760px){.pair-grid,.bottom-grid{grid-template-columns:1fr}}</style>
</head>
<body>
  <div class="wrapper"><h1>Messaging Prop Dashboard</h1><div class="pair-grid"><div class="card"><div class="person-name" id="nameOne">Character One</div><a class="button" id="nameOneChat" target="_blank">Open Message Screen</a><a class="button secondary" id="nameOneHome" target="_blank">Open Home Screen</a><button class="button warning" onclick="toggleHome('one',true)">Activate Home Screen</button><button class="button light" onclick="toggleHome('one',false)">Deactivate Home Screen</button><a class="button light" id="nameOneStyles" target="_blank">Change Styles</a><a class="button light" id="nameOneHomeSettings" target="_blank">Change Home Screen Settings</a><div class="small-status" id="nameOneStatus"></div></div><div class="card"><div class="person-name" id="nameTwo">Character Two</div><a class="button" id="nameTwoChat" target="_blank">Open Message Screen</a><a class="button secondary" id="nameTwoHome" target="_blank">Open Home Screen</a><button class="button warning" onclick="toggleHome('two',true)">Activate Home Screen</button><button class="button light" onclick="toggleHome('two',false)">Deactivate Home Screen</button><a class="button light" id="nameTwoStyles" target="_blank">Change Styles</a><a class="button light" id="nameTwoHomeSettings" target="_blank">Change Home Screen Settings</a><div class="small-status" id="nameTwoStatus"></div></div></div><div class="card"><div class="bottom-grid"><a class="button light" id="messagesSheet" target="_blank">Take Me To The Chat Sheet</a><a class="button light" id="workbookUrl" target="_blank">Open Workbook</a><button class="button light" onclick="refreshDashboard()">Refresh Dashboard</button></div><div class="status" id="status">Loading…</div></div></div>
  <script src="config.js"></script><script src="shared.js"></script>
  <script>
    let dashboardData=null;async function refreshDashboard(){document.getElementById("status").textContent="Refreshing…";try{applyDashboardData(await apiGet("getDashboardData"))}catch(e){document.getElementById("status").textContent="Error: "+e.message}}
    function applyDashboardData(data){dashboardData=data;document.getElementById("nameOne").textContent=data.nameOne;document.getElementById("nameTwo").textContent=data.nameTwo;setLink("nameOneChat","chat.html?me="+encodeURIComponent(data.nameOne)+"&them="+encodeURIComponent(data.nameTwo));setLink("nameTwoChat","chat.html?me="+encodeURIComponent(data.nameTwo)+"&them="+encodeURIComponent(data.nameOne));setLink("nameOneHome","home.html?me="+encodeURIComponent(data.nameOne)+"&them="+encodeURIComponent(data.nameTwo));setLink("nameTwoHome","home.html?me="+encodeURIComponent(data.nameTwo)+"&them="+encodeURIComponent(data.nameOne));setLink("nameOneStyles",data.nameOneStylesUrl);setLink("nameTwoStyles",data.nameTwoStylesUrl);setLink("nameOneHomeSettings",data.nameOneHomeSheetUrl);setLink("nameTwoHomeSettings",data.nameTwoHomeSheetUrl);setLink("messagesSheet",data.messagesSheetUrl);setLink("workbookUrl",data.googleSheetUrl);document.getElementById("nameOneStyles").textContent="Change "+data.nameOne+" Styles";document.getElementById("nameTwoStyles").textContent="Change "+data.nameTwo+" Styles";document.getElementById("nameOneHomeSettings").textContent="Change "+data.nameOne+" Home Screen Settings";document.getElementById("nameTwoHomeSettings").textContent="Change "+data.nameTwo+" Home Screen Settings";document.getElementById("nameOneStatus").textContent="Home active: "+(data.nameOneHomeActive?"YES":"NO");document.getElementById("nameTwoStatus").textContent="Home active: "+(data.nameTwoHomeActive?"YES":"NO");document.getElementById("status").textContent="API URL: "+API_URL}
    function setLink(id,url){document.getElementById(id).href=url||"#"}async function toggleHome(which,active){if(!dashboardData)return;const name=which==="one"?dashboardData.nameOne:dashboardData.nameTwo;try{applyDashboardData(await apiPost("setHomeActive",{owner:name,active:active?"true":"false"}))}catch(e){document.getElementById("status").textContent="Error: "+e.message}}
    refreshDashboard();setInterval(refreshDashboard,5000);
  </script>
</body>
</html>
